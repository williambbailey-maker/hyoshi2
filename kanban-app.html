<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07060f;
    --bg-1: #0e0c1d;
    --glass: rgba(255, 255, 255, 0.07);
    --glass-strong: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.14);
    --text: #f4f2ff;
    --text-dim: rgba(244, 242, 255, 0.55);
    --text-faint: rgba(244, 242, 255, 0.3);
    --accent-1: #7c6cff;
    --accent-2: #ff7eb6;
    --accent-3: #5ad1cd;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', -apple-system, sans-serif;
    color: var(--text);
    background: var(--bg-0);
  }

  body {
    background:
      radial-gradient(circle at 15% 10%, rgba(124,108,255,0.35), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(255,126,182,0.28), transparent 45%),
      radial-gradient(circle at 50% 95%, rgba(90,209,205,0.25), transparent 50%),
      linear-gradient(160deg, var(--bg-1), var(--bg-0));
    background-attachment: fixed;
  }

  /* floating blobs for atmosphere */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    z-index: 0;
    animation: drift 18s ease-in-out infinite;
  }
  .blob.b1 { width: 320px; height: 320px; background: #7c6cff; top: -80px; left: -60px; }
  .blob.b2 { width: 280px; height: 280px; background: #ff7eb6; bottom: -60px; right: -40px; animation-delay: -6s; }
  .blob.b3 { width: 240px; height: 240px; background: #5ad1cd; top: 40%; left: 50%; animation-delay: -12s; }
  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px, 30px) scale(1.1); }
    66% { transform: translate(-30px, 20px) scale(0.95); }
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    padding: 18px 22px 12px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 32px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .brand p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: grid; place-items: center;
    font-weight: 600; font-size: 15px;
    box-shadow: var(--shadow);
  }

  /* horizontal scroll of columns */
  .board {
    flex: 1;
    display: flex;
    gap: 16px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 22px 22px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .board::-webkit-scrollbar { display: none; }

  .column {
    flex: 0 0 84%;
    max-width: 340px;
    scroll-snap-align: center;
    display: flex;
    flex-direction: column;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 26px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .col-head {
    padding: 16px 18px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .col-head h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
  .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--glass-strong);
    padding: 2px 9px;
    border-radius: 20px;
  }

  .cards {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cards::-webkit-scrollbar { width: 0; }

  .card {
    background: var(--glass-strong);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px 15px;
    cursor: grab;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s;
    animation: rise 0.4s ease backwards;
  }
  .card:active { cursor: grabbing; transform: scale(0.98); }
  .card.dragging { opacity: 0.4; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 9px;
    letter-spacing: 0.2px;
  }
  .card h3 { font-size: 15px; font-weight: 500; line-height: 1.35; }
  .card .meta {
    margin-top: 11px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .card .meta span { display: flex; align-items: center; gap: 4px; }

  .add-card {
    margin: 2px 12px 14px;
    padding: 11px;
    border-radius: 16px;
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.18);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-card:hover, .add-card:active {
    background: var(--glass);
    color: var(--text);
    border-color: var(--glass-border);
  }

  /* add-column tile */
  .add-col {
    flex: 0 0 64px;
    scroll-snap-align: end;
    border-radius: 26px;
    border: 1px dashed rgba(255,255,255,0.16);
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text-dim);
    font-size: 26px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s;
  }
  .add-col:active { transform: scale(0.97); color: var(--text); }

  /* modal */
  .sheet-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-bg.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 51;
    background: rgba(20,18,38,0.85);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    border-top: 1px solid var(--glass-border);
    border-radius: 30px 30px 0 0;
    padding: 22px 22px calc(28px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
  }
  .sheet.open { transform: translateY(0); }
  .grip { width: 40px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.25); margin: 0 auto 18px; }
  .sheet label { display: block; font-size: 13px; color: var(--text-dim); margin: 14px 2px 7px; }
  .sheet input, .sheet select {
    width: 100%;
    background: var(--glass-strong);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 13px 15px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    outline: none;
  }
  .sheet input:focus, .sheet select:focus { border-color: var(--accent-1); }
  .sheet-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: white; }
  .btn.ghost { background: var(--glass-strong); color: var(--text); border: 1px solid var(--glass-border); }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    padding: 0 22px 8px;
  }
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div id="app">
  <header>
    <div class="brand">
      <h1>Flow</h1>
      <p id="subtitle">Loading…</p>
    </div>
    <div class="avatar">Yo</div>
  </header>
  <div class="board" id="board"></div>
  <div class="hint">Tap a card to edit · drag between columns · swipe for more</div>
</div>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <label>Task</label>
  <input id="f-title" placeholder="What needs doing?" autocomplete="off">
  <label>Priority</label>
  <select id="f-tag">
    <option value="low">Low</option>
    <option value="med">Medium</option>
    <option value="high">High</option>
  </select>
  <label>Due</label>
  <input id="f-due" placeholder="e.g. Today, Fri, Jun 3" autocomplete="off">
  <div class="sheet-actions">
    <button class="btn ghost" id="f-delete">Delete</button>
    <button class="btn primary" id="f-save">Save</button>
  </div>
</div>

<script>
// ---- data model (in-memory; Claude Code version would persist) ----
const COLORS = { todo:'#7c6cff', doing:'#ff7eb6', done:'#5ad1cd' };
const TAGS = {
  low:  { label:'Low',    bg:'rgba(90,209,205,0.18)',  fg:'#7fe6e2' },
  med:  { label:'Medium', bg:'rgba(124,108,255,0.20)', fg:'#b3a8ff' },
  high: { label:'High',   bg:'rgba(255,126,182,0.20)', fg:'#ffa8cd' },
};
let state = {
  columns: [
    { id:'todo',  title:'To Do',       cards:[
      { id:1, title:'Sketch home screen layout', tag:'high', due:'Today' },
      { id:2, title:'Pick app colour palette', tag:'med', due:'Tomorrow' },
      { id:3, title:'Write project brief', tag:'low', due:'Fri' },
    ]},
    { id:'doing', title:'In Progress', cards:[
      { id:4, title:'Build Kanban prototype', tag:'high', due:'Today' },
    ]},
    { id:'done',  title:'Done',         cards:[
      { id:5, title:'Choose no-code vs code', tag:'med', due:'Done' },
    ]},
  ]
};
let nextId = 6;
let editing = null; // { colId, cardId } or { colId, new:true }

const board = document.getElementById('board');
const sheet = document.getElementById('sheet');
const sheetBg = document.getElementById('sheetBg');

function totalTasks() {
  return state.columns.reduce((n,c)=>n+c.cards.length,0);
}

function render() {
  document.getElementById('subtitle').textContent =
    totalTasks() + ' tasks · ' + (state.columns.find(c=>c.id==='done')?.cards.length||0) + ' done';
  board.innerHTML = '';
  state.columns.forEach(col => {
    const el = document.createElement('div');
    el.className = 'column';
    el.dataset.col = col.id;
    el.innerHTML = `
      <div class="col-head">
        <span class="dot" style="background:${COLORS[col.id]||'#888'}"></span>
        <h2>${col.title}</h2>
        <span class="count">${col.cards.length}</span>
      </div>
      <div class="cards"></div>
      <button class="add-card">+ Add task</button>`;
    const cardsWrap = el.querySelector('.cards');
    col.cards.forEach((card,i) => {
      const c = document.createElement('div');
      c.className = 'card';
      c.draggable = true;
      c.dataset.card = card.id;
      c.style.animationDelay = (i*0.05)+'s';
      const t = TAGS[card.tag];
      c.innerHTML = `
        <span class="tag" style="background:${t.bg};color:${t.fg}">${t.label}</span>
        <h3>${escapeHtml(card.title)}</h3>
        <div class="meta"><span>◷ ${escapeHtml(card.due||'—')}</span></div>`;
      c.addEventListener('click', ()=>openEdit(col.id, card.id));
      addDrag(c, col.id, card.id);
      cardsWrap.appendChild(c);
    });
    el.querySelector('.add-card').addEventListener('click', ()=>openNew(col.id));
    addDropZone(cardsWrap, col.id);
    board.appendChild(el);
  });
  const addCol = document.createElement('div');
  addCol.className = 'add-col';
  addCol.textContent = '+';
  addCol.title = 'Add list';
  addCol.addEventListener('click', addColumn);
  board.appendChild(addCol);
}

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ---- drag & drop ----
let dragData = null;
function addDrag(el, colId, cardId){
  el.addEventListener('dragstart', e=>{
    dragData = { colId, cardId };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  el.addEventListener('dragend', ()=>el.classList.remove('dragging'));
}
function addDropZone(wrap, colId){
  wrap.addEventListener('dragover', e=>{ e.preventDefault(); });
  wrap.addEventListener('drop', e=>{
    e.preventDefault();
    if(!dragData) return;
    moveCard(dragData.colId, dragData.cardId, colId);
    dragData=null;
  });
}
function moveCard(fromCol, cardId, toCol){
  if(fromCol===toCol) return;
  const from = state.columns.find(c=>c.id===fromCol);
  const idx = from.cards.findIndex(c=>c.id===cardId);
  if(idx<0) return;
  const [card] = from.cards.splice(idx,1);
  if(toCol==='done') card.due='Done';
  state.columns.find(c=>c.id===toCol).cards.push(card);
  render();
}

// ---- edit sheet ----
function openNew(colId){
  editing = { colId, new:true };
  document.getElementById('f-title').value='';
  document.getElementById('f-tag').value='med';
  document.getElementById('f-due').value='';
  document.getElementById('f-delete').style.display='none';
  showSheet();
}
function openEdit(colId, cardId){
  const card = state.columns.find(c=>c.id===colId).cards.find(c=>c.id===cardId);
  editing = { colId, cardId };
  document.getElementById('f-title').value=card.title;
  document.getElementById('f-tag').value=card.tag;
  document.getElementById('f-due').value=card.due||'';
  document.getElementById('f-delete').style.display='block';
  showSheet();
}
function showSheet(){ sheetBg.classList.add('open'); sheet.classList.add('open'); }
function hideSheet(){ sheetBg.classList.remove('open'); sheet.classList.remove('open'); editing=null; }

document.getElementById('f-save').addEventListener('click', ()=>{
  const title = document.getElementById('f-title').value.trim();
  if(!title){ hideSheet(); return; }
  const tag = document.getElementById('f-tag').value;
  const due = document.getElementById('f-due').value.trim();
  const col = state.columns.find(c=>c.id===editing.colId);
  if(editing.new){
    col.cards.push({ id:nextId++, title, tag, due });
  } else {
    const card = col.cards.find(c=>c.id===editing.cardId);
    card.title=title; card.tag=tag; card.due=due;
  }
  hideSheet(); render();
});
document.getElementById('f-delete').addEventListener('click', ()=>{
  if(editing && !editing.new){
    const col = state.columns.find(c=>c.id===editing.colId);
    col.cards = col.cards.filter(c=>c.id!==editing.cardId);
  }
  hideSheet(); render();
});
sheetBg.addEventListener('click', hideSheet);

function addColumn(){
  const name = prompt('New list name:');
  if(!name) return;
  state.columns.push({ id:'c'+Date.now(), title:name, cards:[] });
  render();
}

render();
</script>
</body>
</html>
